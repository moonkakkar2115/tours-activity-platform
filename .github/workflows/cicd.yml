name: CI/CD Pipeline

# Trigger pipeline on push to develop (staging) or main (production)
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      # Run tests
      - name: Run tests
        run: npm test
        working-directory: ./backend

      # Lint code
      - name: Lint code
        run: npm run lint
        working-directory: ./backend

  docker-deploy:
    name: Build Docker & Deploy
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build backend Docker image
      - name: Build Docker image
        run: |
          docker build -t tours-backend ./backend

      # Push Docker image
      - name: Push Docker image
        run: |
          docker tag tours-backend ${{ secrets.DOCKER_USERNAME }}/tours-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/tours-backend:latest

      # Deploy to server via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/tours-activity-platform

            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "Deploying Production..."
              docker-compose -f docker-compose.prod.yml pull
              docker-compose -f docker-compose.prod.yml up -d --build
            else
              echo "Deploying Staging..."
              docker-compose -f docker-compose.dev.yml pull
              docker-compose -f docker-compose.dev.yml up -d --build

            # Health check
            sleep 10
            if curl -f http://localhost:3000; then
              echo "Deployment successful!"
            else
              echo "Deployment failed!"
              exit 1
            fi
