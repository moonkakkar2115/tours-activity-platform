name: CI/CD Pipeline

on:
  push:
    branches: [develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build backend image
        run: docker build -t tours-backend ./backend

      - name: Build frontend image
        run: docker build -t tours-frontend ./frontend

      - name: Push backend image
        run: docker tag tours-backend ghcr.io/${{ github.repository }}/backend:latest && docker push ghcr.io/${{ github.repository }}/backend:latest

      - name: Push frontend image
        run: docker tag tours-frontend ghcr.io/${{ github.repository }}/frontend:latest && docker push ghcr.io/${{ github.repository }}/frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/tours-activity-platform
            git pull origin develop
            docker-compose build
            docker-compose up -d
