name: Real CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: cd backend && npm install
      - run: cd backend && npx eslint .

      - run: cd frontend && npm install
      - run: cd frontend && npm run build || true

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tours-backend ./backend
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/tours-backend

      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tours-frontend ./frontend
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/tours-frontend
